name: Deploy JupyterLite to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install numpy scipy plotly anywidget ipywidgets nbconvert ipykernel jupyterlite-core jupyterlite-pyodide-kernel jupyter-server

      - name: Execute notebooks (smoke test)
        run: |
          jupyter nbconvert --to notebook --execute cavity_designer.ipynb --output /tmp/executed.ipynb --ExecutePreprocessor.timeout=120
          jupyter nbconvert --to notebook --execute imc_designer.ipynb    --output /tmp/imc_exec.ipynb  --ExecutePreprocessor.timeout=120
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build JupyterLite site
        run: |
          SHA=$(git rev-parse --short HEAD)
          printf '{"jupyter-lite-schema-version":0,"jupyter-config-data":{"contentsStorageName":"JupyterLite Storage %s"}}\n' "$SHA" > jupyter-lite.json
          mkdir -p _staging
          cp cavity_designer.ipynb _staging/
          cp imc_designer.ipynb    _staging/
          cp -r src/ _staging/src/
          jupyter lite build --contents _staging --output-dir _output

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_output
          publish_branch: gh-pages
